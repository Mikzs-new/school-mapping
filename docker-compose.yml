services:
  backend:
    build: ./backend
    container_name: django_backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file: ./backend:/.env
    volumes:
      - ./backend:/school_map
    ports:
      - "8000:8000"
  
  frontend:
    build: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/school_map
    ports:
      - "3000:3000"
    depends_on:
      - backend